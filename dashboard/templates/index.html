<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TitanTrader Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }
        .title { font-size: 28px; font-weight: bold; }
        .badge {
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }
        .badge-paper { background: #4CAF50; }
        .badge-paused { background: #f44336; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }
        .metric-label { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        .metric-value { font-size: 24px; font-weight: bold; }
        .metric-value.positive { color: #4CAF50; }
        .metric-value.negative { color: #f44336; }
        .section {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th { background: #111; font-weight: bold; }
        tr:hover { background: #333; }
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        canvas { max-height: 300px; }
        .status-ok { color: #4CAF50; }
        .status-warning { color: #ff9800; }
        .status-error { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">TitanTrader</div>
            <div>
                <span class="badge badge-paper" id="mode-badge">PAPER</span>
                <span style="margin-left: 10px; font-size: 12px; color: #aaa;" id="last-update">Loading...</span>
            </div>
        </div>

        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">Portfolio Value</div>
                <div class="metric-value" id="total-value">$0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Cash</div>
                <div class="metric-value" id="cash">$0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">P&L (USD)</div>
                <div class="metric-value" id="pnl-usd">$0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">P&L (%)</div>
                <div class="metric-value" id="pnl-pct">0.00%</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Open Positions</div>
                <div class="metric-value" id="positions-count">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Drawdown</div>
                <div class="metric-value" id="drawdown">0.00%</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Equity Curve</div>
            <canvas id="equity-chart"></canvas>
        </div>

        <div class="two-col">
            <div class="section">
                <div class="section-title">Open Positions</div>
                <table>
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Qty</th>
                            <th>Entry</th>
                            <th>P&L</th>
                        </tr>
                    </thead>
                    <tbody id="positions-table"></tbody>
                </table>
            </div>

            <div class="section">
                <div class="section-title">Strategies</div>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Active</th>
                            <th>Win Rate</th>
                            <th>Trades</th>
                        </tr>
                    </thead>
                    <tbody id="strategies-table"></tbody>
                </table>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Recent Trades</div>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Symbol</th>
                        <th>Side</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>P&L</th>
                        <th>Strategy</th>
                    </tr>
                </thead>
                <tbody id="trades-table"></tbody>
            </table>
        </div>

        <div class="section">
            <div class="section-title">Lessons Learned</div>
            <div id="lessons-list"></div>
        </div>
    </div>

    <script>
        let equityChart = null;

        async function updateDashboard() {
            try {
                const [status, equity, trades, positions, strategies, lessons] = await Promise.all([
                    fetch('/api/status').then(r => r.json()),
                    fetch('/api/equity').then(r => r.json()),
                    fetch('/api/trades').then(r => r.json()),
                    fetch('/api/positions').then(r => r.json()),
                    fetch('/api/strategies').then(r => r.json()),
                    fetch('/api/lessons').then(r => r.json()),
                ]);

                updateMetrics(status);
                updateChart(equity);
                updatePositions(positions);
                updateStrategies(strategies);
                updateTrades(trades);
                updateLessons(lessons);

            } catch (error) {
                console.error('Dashboard update failed:', error);
            }
        }

        function updateMetrics(status) {
            document.getElementById('total-value').textContent = `$${status.total_value.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('cash').textContent = `$${status.cash.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            const pnlDiv = document.getElementById('pnl-usd');
            pnlDiv.textContent = `$${status.pnl_usd.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            pnlDiv.className = `metric-value ${status.pnl_usd >= 0 ? 'positive' : 'negative'}`;

            const pnlPctDiv = document.getElementById('pnl-pct');
            pnlPctDiv.textContent = `${status.pnl_pct.toFixed(2)}%`;
            pnlPctDiv.className = `metric-value ${status.pnl_pct >= 0 ? 'positive' : 'negative'}`;

            document.getElementById('positions-count').textContent = status.open_positions;

            const ddDiv = document.getElementById('drawdown');
            ddDiv.textContent = `${status.drawdown_pct.toFixed(2)}%`;
            ddDiv.className = `metric-value ${status.drawdown_pct < 5 ? 'status-ok' : status.drawdown_pct < 10 ? 'status-warning' : 'status-error'}`;

            const badge = document.getElementById('mode-badge');
            if (status.is_paused) {
                badge.textContent = 'PAUSED';
                badge.className = 'badge badge-paused';
            } else {
                badge.textContent = 'PAPER';
                badge.className = 'badge badge-paper';
            }

            document.getElementById('last-update').textContent = `Updated: ${new Date(status.last_update).toLocaleTimeString()}`;
        }

        function updateChart(equity) {
            const ctx = document.getElementById('equity-chart').getContext('2d');

            if (equityChart) {
                equityChart.destroy();
            }

            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: equity.map(e => new Date(e.timestamp).toLocaleDateString()),
                    datasets: [{
                        label: 'Portfolio Value',
                        data: equity.map(e => e.total_value),
                        borderColor: '#4CAF50',
                        backgroundColor: 'rgba(76, 175, 80, 0.1)',
                        tension: 0.1,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, grid: { color: '#333' }, ticks: { color: '#aaa' } },
                        x: { grid: { color: '#333' }, ticks: { color: '#aaa' } }
                    }
                }
            });
        }

        function updatePositions(positions) {
            const tbody = document.getElementById('positions-table');
            tbody.innerHTML = positions.map(p => `
                <tr>
                    <td>${p.symbol}</td>
                    <td>${p.qty.toFixed(4)}</td>
                    <td>$${p.entry.toFixed(2)}</td>
                    <td class="${p.unrealized_pnl >= 0 ? 'status-ok' : 'status-error'}">$${p.unrealized_pnl.toFixed(2)}</td>
                </tr>
            `).join('') || '<tr><td colspan="4" style="text-align: center;">No open positions</td></tr>';
        }

        function updateStrategies(strategies) {
            const tbody = document.getElementById('strategies-table');
            tbody.innerHTML = strategies.map(s => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.is_active ? '✓' : '✗'}</td>
                    <td>${s.win_rate.toFixed(1)}%</td>
                    <td>${s.trades}</td>
                </tr>
            `).join('');
        }

        function updateTrades(trades) {
            const tbody = document.getElementById('trades-table');
            tbody.innerHTML = trades.slice(0, 20).map(t => `
                <tr>
                    <td>${new Date(t.timestamp).toLocaleTimeString()}</td>
                    <td>${t.symbol}</td>
                    <td>${t.side}</td>
                    <td>${t.qty.toFixed(4)}</td>
                    <td>$${t.fill_price.toFixed(4)}</td>
                    <td class="${t.pnl >= 0 ? 'status-ok' : 'status-error'}">$${t.pnl.toFixed(2)}</td>
                    <td>${t.strategy}</td>
                </tr>
            `).join('') || '<tr><td colspan="7" style="text-align: center;">No trades yet</td></tr>';
        }

        function updateLessons(lessons) {
            const div = document.getElementById('lessons-list');
            div.innerHTML = lessons.slice(0, 5).map(l => `
                <div style="background: #111; padding: 10px; margin-bottom: 10px; border-radius: 4px; border-left: 3px solid #4CAF50;">
                    <div style="font-size: 12px; color: #aaa;">${new Date(l.timestamp).toLocaleString()}</div>
                    <div style="font-weight: bold;">${l.trigger}</div>
                    <div style="font-size: 13px; margin-top: 5px;">${l.description}</div>
                </div>
            `).join('') || '<div style="text-align: center; color: #666;">No lessons yet</div>';
        }

        updateDashboard();
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>

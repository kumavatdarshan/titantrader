name: TitanTrader 24/7 Trading Bot

on:
  schedule:
    # Run every 30 minutes during US market hours (9:30 AM - 4:00 PM ET)
    # 9:30 AM ET = 1:30 PM UTC, 4:00 PM ET = 8:00 PM UTC
    - cron: '0,30 13-19 * * 1-5'  # Mon-Fri, 1:30 PM - 7:30 PM UTC (covers 9:30 AM - 4:00 PM ET)
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        echo "📦 Installing dependencies..."
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        echo "✓ Dependencies installed"

    - name: Create directories
      run: |
        echo "📁 Creating directories..."
        mkdir -p logs models
        echo "✓ Directories created"

    - name: Create .env file
      run: |
        echo "🔐 Creating .env file..."
        cat > .env << 'EOF'
        TRADING_MODE=${{ secrets.TRADING_MODE }}
        ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
        ALPACA_PAPER_URL=https://paper-api.alpaca.markets
        ALPACA_LIVE_URL=https://api.alpaca.markets
        STARTING_CAPITAL=${{ secrets.STARTING_CAPITAL }}
        SYMBOLS=${{ secrets.SYMBOLS }}
        TRADE_INTERVAL_MINUTES=30
        LOG_LEVEL=INFO
        EOF
        echo "✓ .env file created"
        echo "Environment check:"
        wc -l .env
        head -3 .env

    - name: Run trading cycle
      timeout-minutes: 3
      run: |
        echo "🚀 Starting trading cycle at $(date -u)"
        python run_cycle.py 2>&1 | tee logs/run.log
        echo "✓ Trading cycle completed at $(date -u)"
        echo "Exit status: $?"
      continue-on-error: true

    - name: Debug - Check workflow results
      if: always()
      run: |
        echo "📊 Workflow Results:"
        echo "Database file:"
        ls -lh titantrader.db 2>/dev/null || echo "❌ No database file"
        echo "Logs:"
        ls -lh logs/ 2>/dev/null || echo "❌ No logs"
        echo "Models:"
        ls -lh models/ 2>/dev/null || echo "❌ No models"
        if [ -f logs/run.log ]; then
          echo "=== Last 20 lines of run.log ==="
          tail -20 logs/run.log
        fi

    - name: Commit and push results
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add titantrader.db logs/ models/ 2>/dev/null || true
        git commit -m "Auto: Trading cycle $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "Nothing to commit"
        git push || echo "Push failed"
      continue-on-error: true

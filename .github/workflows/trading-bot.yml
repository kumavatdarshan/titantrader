name: TitanTrader 24/7 Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Create directories
      run: mkdir -p logs models

    - name: Create .env file
      run: |
        cat > .env << 'EOF'
        TRADING_MODE=${{ secrets.TRADING_MODE }}
        ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
        STARTING_CAPITAL=${{ secrets.STARTING_CAPITAL }}
        SYMBOLS=${{ secrets.SYMBOLS }}
        TRADE_INTERVAL_MINUTES=30
        LOG_LEVEL=INFO
        EOF

    - name: Run trading cycle
      run: python run_cycle.py 2>&1 | tee logs/run.log
      continue-on-error: true

    - name: Commit and push updates
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add -A
        git commit -m "Trading cycle: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
        git push

name: TitanTrader 24/7 Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Create directories
      run: mkdir -p logs models

    - name: Create .env file
      run: |
        cat > .env << 'EOF'
        TRADING_MODE=${{ secrets.TRADING_MODE }}
        ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
        ALPACA_PAPER_URL=https://paper-api.alpaca.markets
        ALPACA_LIVE_URL=https://api.alpaca.markets
        STARTING_CAPITAL=${{ secrets.STARTING_CAPITAL }}
        SYMBOLS=${{ secrets.SYMBOLS }}
        TRADE_INTERVAL_MINUTES=30
        LOG_LEVEL=INFO
        EOF

    - name: Run trading cycle
      timeout-minutes: 3
      run: |
        timeout 90s python run_cycle.py 2>&1 | tee logs/run.log || echo "⚠️ Trading cycle completed with status: $?"
      continue-on-error: true

    - name: Commit and push results
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add titantrader.db logs/ models/ 2>/dev/null || true
        git commit -m "Auto: Trading cycle $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "Nothing to commit"
        git push || echo "Push failed"
      continue-on-error: true

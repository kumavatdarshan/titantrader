name: TitanTrader - Live Trading

on:
  schedule:
    # Run every 30 minutes during US market hours (9:30 AM - 3:00 PM ET)
    # 9:30 AM ET = 1:30 PM UTC, 3:00 PM ET = 7:00 PM UTC
    - cron: '0,30 13-19 * * 1-5'  # Monday-Friday only
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v5

    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: 📁 Setup directories
      run: mkdir -p logs models

    - name: 🔐 Configure secrets
      run: |
        cat > .env << 'EOF'
        TRADING_MODE=${{ secrets.TRADING_MODE }}
        ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
        STARTING_CAPITAL=${{ secrets.STARTING_CAPITAL }}
        SYMBOLS=${{ secrets.SYMBOLS }}
        EOF

    - name: 🚀 Execute trading cycle
      timeout-minutes: 4
      run: |
        python run_cycle.py 2>&1 | tee logs/trade_$(date +%Y%m%d_%H%M%S).log
      continue-on-error: true

    - name: 💾 Sync results
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add -A 2>/dev/null || true
        git commit -m "Auto: Trading cycle $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "Nothing to commit"
        git push || echo "Push skipped"
      continue-on-error: true

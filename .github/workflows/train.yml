name: TitanTrader - ML Training

on:
  schedule:
    # Run every night at 10 PM UTC (6 PM ET) after market close (4 PM ET)
    # 10 PM UTC = 6 PM ET = 2 hours after market close for safety margin
    - cron: '0 22 * * 1-5'  # Monday-Friday only
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Setup directories
      run: mkdir -p models logs

    - name: Train ML Model
      run: |
        python -c "
        import asyncio
        import logging
        from learner import Learner
        from db import init_db, get_session_factory

        logging.basicConfig(level=logging.INFO)
        logger = logging.getLogger(__name__)

        async def train():
            logger.info('[START] ML model retraining...')
            try:
                db_engine = await init_db()
                session_factory = get_session_factory(db_engine)
                learner = Learner(session_factory)
                await learner.retrain_ml_model()
                logger.info('[OK] ML training completed successfully')
            except Exception as e:
                logger.error(f'[ERROR] Training failed: {e}', exc_info=True)
                raise

        asyncio.run(train())
        " 2>&1 | tee logs/train_$(date +%Y%m%d_%H%M%S).log
      continue-on-error: true

    - name: Generate Daily Report
      run: |
        python -c "
        import sqlite3
        import os
        from datetime import datetime, timedelta

        if not os.path.exists('titantrader.db'):
            print('[REPORT] No trades yet - database not created')
            exit(0)

        conn = sqlite3.connect('titantrader.db')
        cursor = conn.cursor()

        # Today's stats
        today = datetime.now().date()
        cursor.execute('''
            SELECT COUNT(*), SUM(net_pnl)
            FROM trades
            WHERE DATE(timestamp) = ?
        ''', (str(today),))
        result = cursor.fetchone()
        trade_count, daily_pnl = (result[0] or 0, result[1] or 0.0) if result else (0, 0.0)

        # All-time stats
        cursor.execute('SELECT COUNT(*), SUM(net_pnl) FROM trades')
        result = cursor.fetchone()
        total_trades, total_pnl = (result[0] or 0, result[1] or 0.0) if result else (0, 0.0)

        print('[REPORT] Daily Statistics')
        print(f'Today: {trade_count} trades, P+L: \${daily_pnl:+.2f}')
        print(f'All-time: {total_trades} trades, P+L: \${total_pnl:+.2f}')

        conn.close()
        " 2>&1 | tee -a logs/daily_report.log
      continue-on-error: true

    - name: Commit results to GitHub
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add -A 2>/dev/null || true
        git commit -m "Auto: ML training $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "Nothing to commit"
        git push || echo "Push skipped"
      continue-on-error: true

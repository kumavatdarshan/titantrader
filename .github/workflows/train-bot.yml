name: TitanTrader Training (1 Month to Real Money)

on:
  schedule:
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TitanTrader (4 hours)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TRADING_MODE: alpaca_paper
          TRADE_INTERVAL_MINUTES: 5
        run: |
          python main.py &
          BOT_PID=$!
          sleep 14400
          kill $BOT_PID || true
          wait $BOT_PID 2>/dev/null || true

      - name: Upload database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: titantrader-db
          path: titantrader.db
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 7

name: 🚀 TitanTrader Elite Training - World Class Trading Bot

on:
  schedule:
    # Market Open Trading: 7:00 PM IST = 1:30 PM UTC = 9:30 AM EDT
    # - HIGHEST volatility & volume at market open
    # - Best risk/reward setup for momentum strategies
    # - Capture opening gaps and big moves
    - cron: '30 13 * * *'

    # Pre-Close Trading: 12:30 AM IST = 7:00 PM UTC = 3:00 PM EDT
    # - Afternoon volatility before market close
    # - Catch closing rallies and dumps
    # - 1 hour before market close for better fills
    - cron: '0 19 * * *'

    # Post-Market ML Training: 2:00 AM IST = 8:30 PM UTC (previous day)
    # - AFTER US market closes (market closes 4 PM ET = 1:30 AM IST)
    # - Train on full day's trading data
    # - Intensive model retraining with ensemble methods
    # - Hyperparameter tuning & feature importance analysis
    - cron: '30 20 * * *'

  workflow_dispatch:

jobs:
  elite-training:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v5

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: 📁 Create Required Directories
        run: |
          mkdir -p logs
          mkdir -p models

      - name: 🔐 Configure Secrets
        run: |
          echo "ALPACA_BASE_URL=${{ secrets.ALPACA_BASE_URL }}" >> .env
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" >> .env
          echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}" >> .env

      - name: 📊 Determine Training Mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "04" ]; then
            echo "Training mode: PAPER_TRADING"
            echo "mode=paper" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "20" ]; then
            echo "Training mode: ML_INTENSIVE"
            echo "mode=ml" >> $GITHUB_OUTPUT
          else
            echo "Training mode: MANUAL"
            echo "mode=manual" >> $GITHUB_OUTPUT
          fi

      - name: 📈 Paper Trading Session (4 hours)
        if: steps.mode.outputs.mode == 'paper' || steps.mode.outputs.mode == 'manual'
        env:
          TRADING_MODE: alpaca_paper
          LOG_LEVEL: INFO
        run: |
          echo "🎯 Starting Elite Paper Trading Session..."
          timeout 240m python main.py
          echo "✅ Paper trading session completed"

      - name: 🤖 Elite ML Model Training (Intensive)
        if: steps.mode.outputs.mode == 'ml' || steps.mode.outputs.mode == 'manual'
        env:
          TRADING_MODE: alpaca_paper
          LOG_LEVEL: DEBUG
        run: |
          echo "🚀 Starting Elite ML Model Retraining..."
          python -c "
          import asyncio
          import logging
          from learner import Learner
          from db import init_db, get_session_factory

          logging.basicConfig(level=logging.DEBUG)
          logger = logging.getLogger(__name__)

          async def train():
              db_engine = await init_db()
              session_factory = get_session_factory(db_engine)
              learner = Learner(session_factory)
              logger.info('🤖 Starting model training...')
              await learner.retrain_ml_model()
              logger.info('✅ Elite ML training completed')

          asyncio.run(train())
          "
          echo "✅ ML training session completed"

      - name: 📊 Backtest Best Model
        if: always()
        run: |
          echo "🧪 Running backtest on trained models..."
          python -c "
          import asyncio
          from backtester import Backtester
          from db import init_db, get_session_factory

          async def backtest():
              db_engine = await init_db()
              session_factory = get_session_factory(db_engine)
              backtester = Backtester(session_factory)
              await backtester.run_full_backtest()

          asyncio.run(backtest())
          " || true
          echo "✅ Backtest completed (may have failed silently)"

      - name: 📤 Upload Database (60-day retention)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: titantrader-db
          path: titantrader.db
          retention-days: 60
          if-no-files-found: ignore

      - name: 📤 Upload ML Models (90-day retention)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: elite-models
          path: models/
          retention-days: 90
          if-no-files-found: ignore

      - name: 📤 Upload Trading Logs (30-day retention)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trading-logs
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: 🔔 Notify Completion
        if: always()
        run: |
          echo "✅ TitanTrader Elite Training Complete!"
          echo "Mode: ${{ steps.mode.outputs.mode }}"
          echo "Timestamp: $(date -u)"

name: TitanTrader - NSE Trading Cycle (Paper Mode)

on:
  schedule:
    # Run every 30 minutes during NSE market hours (9:30 AM - 3:00 PM IST = 4:00-9:30 AM UTC)
    # NSE opens at 9:15 AM IST, closes at 3:30 PM IST
    - cron: '0,30 4-9 * * 1-5'  # Monday-Friday only
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Setup directories
      run: mkdir -p logs models

    - name: Configure environment
      run: |
        cat > .env << 'EOF'
        TRADING_MODE=local_paper
        STARTING_CAPITAL=100000
        SYMBOLS=TCS.NS,INFY.NS,RELIANCE.NS,HDFC.NS,BAJAJFINSV.NS,MARUTI.NS,SUNPHARMA.NS,WIPRO.NS,HCLTECH.NS,TECHM.NS
        LOG_LEVEL=INFO
        EOF

    - name: Execute trading cycle
      timeout-minutes: 4
      run: |
        python run_cycle.py 2>&1 | tee logs/trade_$(date +%Y%m%d_%H%M%S).log
      continue-on-error: true

    - name: Sync results to GitHub
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add -A 2>/dev/null || true
        git commit -m "Auto: Trading cycle $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "Nothing to commit"
        git push || echo "Push skipped"
      continue-on-error: true

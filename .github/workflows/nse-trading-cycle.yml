name: TitanTrader - NSE Trading Cycle (Paper Mode)

on:
  push:
    branches:
      - main
    paths:
      - 'engine.py'
      - 'strategies/**'
      - 'run_cycle.py'
  schedule:
    # Run every 5 minutes on weekdays for testing
    - cron: '*/5 * * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Setup Python 3.11
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Setup directories
      run: mkdir -p logs models

    - name: Configure environment
      run: |
        cat > .env << 'EOF'
        TRADING_MODE=local_paper
        STARTING_CAPITAL=100000
        SYMBOLS=TCS.NS,INFY.NS,RELIANCE.NS,BAJAJFINSV.NS,MARUTI.NS,SUNPHARMA.NS,WIPRO.NS,HCLTECH.NS,TECHM.NS
        LOG_LEVEL=INFO
        ML_MIN_TRADES_TO_TRAIN=50
        EOF

    - name: Execute trading cycle
      timeout-minutes: 2
      run: |
        python run_cycle.py 2>&1 | tee logs/trade_$(date +%Y%m%d_%H%M%S).log
      continue-on-error: true

    - name: Sync results to GitHub
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add -A 2>/dev/null || true
        git commit -m "Auto: Trading cycle $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "Nothing to commit"
        git push || echo "Push skipped"
      continue-on-error: true

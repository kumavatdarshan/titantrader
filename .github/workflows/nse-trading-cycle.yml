name: TitanTrader - NSE Trading Cycle (Paper Mode)

on:
  schedule:
    # Run every 30 minutes during US market hours (9:30 AM - 3:30 PM ET = 1:30 PM - 7:30 PM UTC)
    # Note: NSE data from yfinance is 15-min delayed, so timing is flexible
    - cron: '0,30 13-19 * * 1-5'  # Monday-Friday only
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Setup directories
      run: mkdir -p logs models

    - name: Configure secrets
      run: |
        cat > .env << 'EOF'
        TRADING_MODE=${{ secrets.TRADING_MODE }}
        STARTING_CAPITAL=${{ secrets.STARTING_CAPITAL }}
        SYMBOLS=${{ secrets.SYMBOLS }}
        ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
        EOF

    - name: Execute trading cycle
      timeout-minutes: 4
      run: |
        python run_cycle.py 2>&1 | tee logs/trade_$(date +%Y%m%d_%H%M%S).log
      continue-on-error: true

    - name: Sync results to GitHub
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add -A 2>/dev/null || true
        git commit -m "Auto: Trading cycle $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "Nothing to commit"
        git push || echo "Push skipped"
      continue-on-error: true

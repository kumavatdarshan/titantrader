name: TitanTrader - NSE Trading Cycle (Paper Mode)

on:
  push:
    branches:
      - main
    paths:
      - 'engine.py'
      - 'strategies/**'
      - 'run_cycle.py'
  schedule:
    # Run every 15 minutes during NSE market hours (9:30 AM - 3:30 PM IST = 4 AM - 10 AM UTC)
    # Hours 4-10 cover open through close; hour 10 triggers end-of-day square-off (engine MARKET_CLOSE_HOUR_UTC=10)
    # Minutes offset from :00 so GitHub's high-load scheduler is less likely to delay/skip runs
    # Weekdays only (1-5 = Mon-Fri)
    - cron: '3,18,33,48 4-10 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Setup Python 3.11
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Setup directories
      run: mkdir -p logs models

    - name: Configure environment
      run: |
        cat > .env << 'EOF'
        TRADING_MODE=local_paper
        STARTING_CAPITAL=100000
        SYMBOLS=TCS.NS,INFY.NS,RELIANCE.NS,HDFCBANK.NS,BAJAJFINSV.NS,MARUTI.NS,SUNPHARMA.NS,WIPRO.NS,HCLTECH.NS,TECHM.NS
        LOG_LEVEL=INFO
        ML_MIN_TRADES_TO_TRAIN=15
        EOF

    - name: Execute trading cycle
      timeout-minutes: 2
      run: |
        python run_cycle.py 2>&1 | tee logs/trade_$(date +%Y%m%d_%H%M%S).log
      env:
        PYTHONUNBUFFERED: "1"
        TZ: "UTC"

    - name: Sync results to GitHub
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add -A 2>/dev/null || true
        git commit -m "Auto: Trading cycle $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "Nothing to commit"
        git pull --rebase 2>/dev/null || true
        git push || echo "Push skipped"
      continue-on-error: true
